name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.server }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: [cal_log, metacog, schemaforge]
    defaults:
      run:
        working-directory: mcp_servers/${{ matrix.server }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: mcp_servers/${{ matrix.server }}/go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: mcp_servers/${{ matrix.server }}
          version: latest

      - name: Unit tests
        run: go test -race -count=1 -timeout 5m ./...
