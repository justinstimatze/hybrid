name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.server }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: [cal_log, metacog, schemaforge]
    defaults:
      run:
        working-directory: mcp_servers/${{ matrix.server }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: mcp_servers/${{ matrix.server }}/go.mod

      - uses: github/codeql-action/init@v4
        with:
          languages: go

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go-${{ matrix.server }}"
